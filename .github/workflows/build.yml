name: Build APK from Single HTML

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare Project and Install Capacitor
        run: |
          mkdir app-project
          cd app-project
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          mkdir www
          cp ../index.html www/ 2>/dev/null || true
          
          npx cap init SimpleApp com.simple.app --web-dir www
          npx cap add android

      - name: Clear Gradle Cache
        run: rm -rf ~/.gradle/caches/

      - name: Build APK
        run: |
          cd app-project/android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --no-parallel

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app-project/android/app/build/outputs/apk/debug/app-debug.apk
          
